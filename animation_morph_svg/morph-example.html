<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GSAP MorphSVG 示例</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: #1e293b;
            line-height: 1.6;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        p {
            text-align: center;
            color: #64748b;
            font-size: 1rem;
            font-weight: 400;
            max-width: 800px;
            margin-bottom: 2rem;
        }

        .controls-container {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .slider-container label {
            font-weight: 500;
            color: #475569;
            font-size: 0.875rem;
        }

        .slider-container input[type="range"] {
            -webkit-appearance: none;
            width: 120px;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            outline: none;
            cursor: pointer;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        .slider-container span {
            font-weight: 600;
            color: #6366f1;
            min-width: 48px;
            text-align: right;
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: stretch;
            width: 100%;
            max-width: 1400px;
            gap: 24px;
            margin-bottom: 32px;
        }

        .display-box {
            flex: 1;
            min-width: 280px;
            padding: 32px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .display-box:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.15);
        }

        .display-box h2 {
            margin: 0 0 20px 0;
            font-size: 1.25rem;
            font-weight: 600;
            color: #1e293b;
        }

        svg {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .upload-container {
            margin-top: 24px;
            padding: 32px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            width: 100%;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        .upload-container h3 {
            margin: 0 0 20px 0;
            font-size: 1.125rem;
            font-weight: 600;
            color: #1e293b;
        }

        .upload-grid {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .upload-grid input[type="file"] {
            width: 160px;
            padding: 10px 16px;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.5);
            font-size: 0.875rem;
            color: #64748b;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .upload-grid input[type="file"]:hover {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.05);
        }

        button {
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
            letter-spacing: 0.01em;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background: linear-gradient(135deg, #94a3b8, #64748b);
            cursor: not-allowed;
            opacity: 0.7;
            box-shadow: none;
        }

        button:focus {
            outline: 2px solid #6366f1;
            outline-offset: 2px;
        }

        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
                align-items: center;
            }

            .display-box {
                width: 100%;
                max-width: 400px;
            }
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 1.75rem;
            }

            p {
                font-size: 0.875rem;
            }

            .controls-container {
                gap: 16px;
            }

            button {
                padding: 12px 24px;
                font-size: 0.875rem;
            }

            .upload-grid {
                flex-direction: column;
                align-items: center;
            }

            .upload-grid input[type="file"] {
                width: 100%;
                max-width: 280px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

    <!-- 步骤 1: 引入 GSAP 核心库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <!-- 步骤 2: 引入您本地的 MorphSVG 插件 -->
    <script src="./MorphSVGPlugin.min.js"></script>

    <h1>GSAP MorphSVG 交互式演示</h1>
    <p>GSAP（GreenSock Animation Platform）是由 GreenSock 开发的一套高性能、跨浏览器的 JavaScript 动画库</p>

    <div class="controls-container">
        <button onclick="runAllMorphs()">开始变形</button>
        <div class="slider-container">
            <label for="duration-slider">总时长:</label>
            <input type="range" id="duration-slider" min="1" max="8" value="3" step="0.5">
            <span id="duration-label">3.0s</span>
        </div>
    </div>

    <div class="main-container">
        <div class="display-box">
            <h2>固定示例</h2>
            <svg id="svg-left" width="250" height="250" viewBox="0 0 100 100">
                <path id="circle" d="M50,5 A45,45 0 1,1 49.9,5 Z" fill="#3498db" />
                <path id="star" d="M50,0 L61,35 L98,35 L68,57 L79,91 L50,70 L21,91 L32,57 L2,35 L39,35 Z" style="display: none;" />
            </svg>
        </div>
        <div class="display-box">
            <h2>项目内SVG</h2>
            <svg id="svg-middle" width="250" height="250" viewBox="0 0 100 100">
                <path id="project-shape-display" fill="#e67e22" />
            </svg>
        </div>
        <div class="display-box">
            <h2>自定义示例</h2>
            <svg id="svg-right" width="250" height="250" viewBox="0 0 100 100">
                <path id="user-shape-display" fill="#2ecc71" />
            </svg>
        </div>
    </div>

    <div class="upload-container">
        <h3>上传你的 SVG 文件 (最多5个)</h3>
        <div class="upload-grid">
            <input type="file" id="file1" accept=".svg">
            <input type="file" id="file2" accept=".svg">
            <input type="file" id="file3" accept=".svg">
            <input type="file" id="file4" accept=".svg">
            <input type="file" id="file5" accept=".svg">
        </div>
    </div>

    <script>
        gsap.registerPlugin(MorphSVGPlugin);

        const userShapes = [];
        let projectShapes = [];
        const mainButton = document.querySelector("button");
        const durationSlider = document.getElementById('duration-slider');
        const durationLabel = document.getElementById('duration-label');

        // --- Event Listeners ---
        durationSlider.addEventListener('input', () => {
            durationLabel.textContent = `${parseFloat(durationSlider.value).toFixed(1)}s`;
        });

        for (let i = 1; i <= 5; i++) {
            document.getElementById(`file${i}`).addEventListener('change', (e) => handleFileSelect(e, i - 1));
        }

        // --- File & Data Loading ---
        async function loadShapeFromFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const svgContent = e.target.result;
                    const parser = new DOMParser();
                    const svgDoc = parser.parseFromString(svgContent, "image/svg+xml");
                    const svgElement = svgDoc.querySelector('svg');
                    const pathElement = svgDoc.querySelector('path');
                    console.log('Parsing SVG:', file.name, 'svgElement:', !!svgElement, 'pathElement:', !!pathElement);
                    if (pathElement && svgElement) {
                        const pathD = pathElement.getAttribute('d');
                        const viewBox = svgElement.getAttribute('viewBox');
                        console.log('Path d:', pathD ? 'found' : 'missing', 'viewBox:', viewBox ? 'found' : 'missing');
                        if (pathD && viewBox) {
                            resolve({ path: pathD, viewBox: viewBox });
                        } else {
                            reject('Path or viewBox attribute missing.');
                        }
                    } else {
                        reject('SVG or Path element not found.');
                    }
                };
                reader.onerror = (err) => reject(err);
                reader.readAsText(file);
            });
        }

        async function handleFileSelect(event, index) {
            try {
                const shape = await loadShapeFromFile(event.target.files[0]);
                userShapes[index] = shape;
                console.log(`User SVG ${index + 1} loaded.`);
                if (userShapes.filter(s => s).length === 1) {
                    // 使用原生 DOM API 设置属性
                    const pathElement = document.getElementById('user-shape-display');
                    const svgElement = document.getElementById('svg-right');
                    if (pathElement && svgElement) {
                        pathElement.setAttribute('d', shape.path);
                        svgElement.setAttribute('viewBox', shape.viewBox);
                    }
                }
            } catch (error) {
                alert(`Error loading user SVG ${index + 1}: ${error}`);
            }
        }

        async function loadProjectSVGs() {
            try {
                projectShapes = embeddedSVGs;

                if (projectShapes.length > 0) {
                    // 使用原生 DOM API 设置属性，更可靠
                    const pathElement = document.getElementById('project-shape-display');
                    const svgElement = document.getElementById('svg-middle');
                    
                    if (pathElement && svgElement) {
                        pathElement.setAttribute('d', projectShapes[0].path);
                        svgElement.setAttribute('viewBox', projectShapes[0].viewBox);
                        console.log(`${projectShapes.length} project SVGs loaded successfully.`);
                    } else {
                        console.error('Could not find project SVG elements');
                    }
                } else {
                    console.warn("No project SVGs could be loaded.");
                }
            } catch (error) {
                console.error("Failed to load project SVGs:", error);
            }
        }

        // --- Main Animation Logic ---
        function runAllMorphs() {
            mainButton.disabled = true;

            const masterTimeline = gsap.timeline({
                onComplete: () => { mainButton.disabled = false; }
            });

            const tlLeft = gsap.timeline({ repeat: 1, yoyo: true, repeatDelay: 0.5 });
            tlLeft.to("#circle", { duration: 1.5, morphSVG: "#star", ease: "elastic.out(1, 0.4)" });
            masterTimeline.add(tlLeft, 0);

            const validProjectShapes = projectShapes.filter(s => s);
            if (validProjectShapes.length >= 2) {
                const tlMiddle = createMorphTimeline("#project-shape-display", "#svg-middle", validProjectShapes, ['#e67e22', '#f1c40f', '#e74c3c', '#9b59b6', '#3498db']);
                masterTimeline.add(tlMiddle, 0);
            }

            const validUserShapes = userShapes.filter(s => s);
            if (validUserShapes.length >= 2) {
                const tlRight = createMorphTimeline("#user-shape-display", "#svg-right", validUserShapes, ['#2ecc71', '#1abc9c', '#3498db', '#9b59b6', '#f1c40f']);
                masterTimeline.add(tlRight, 0);
            }
        }

        function createMorphTimeline(pathSelector, svgSelector, shapes, colors) {
            const totalDuration = parseFloat(durationSlider.value);
            const singleDuration = totalDuration / (shapes.length - 1);
            const timeline = gsap.timeline();

            // 使用原生 DOM API 初始化
            const pathEl = document.querySelector(pathSelector);
            const svgEl = document.querySelector(svgSelector);
            if (pathEl && svgEl) {
                pathEl.setAttribute('d', shapes[0].path);
                pathEl.setAttribute('fill', colors[0]);
                svgEl.setAttribute('viewBox', shapes[0].viewBox);
            }

            for (let i = 0; i < shapes.length - 1; i++) {
                const nextShape = shapes[i+1];
                const nextColor = colors[(i + 1) % colors.length];

                timeline.to(pathSelector, {
                    duration: singleDuration,
                    morphSVG: { shape: nextShape.path },
                    rotation: "+=360",
                    transformOrigin: "50% 50%",
                    fill: nextColor,
                    ease: "power4.inOut"
                })
                .to(svgSelector, {
                    duration: singleDuration,
                    attr: { viewBox: nextShape.viewBox },
                    ease: "power4.inOut"
                }, "<");
            }
            return timeline;
        }

        window.addEventListener('DOMContentLoaded', loadProjectSVGs);
    </script>
