<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>状态观测面板 - 集群多卡模型训练</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333333;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #333333;
            margin-bottom: 16px;
        }

        .isometric-container {
            background-color: #f5f5f5;
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 32px;
            position: relative;
            min-height: 600px;
        }

        .host-module {
            position: absolute;
            top: 100px;
            left: 100px;
            width: 300px;
            height: 150px;
            background-color: #ffffff;
            border: 2px solid #cccccc;
            border-radius: 8px;
            padding: 16px;
        }

        .device-module {
            position: absolute;
            top: 100px;
            right: 100px;
            width: 300px;
            height: 150px;
            background-color: #ffffff;
            border: 2px solid #cccccc;
            border-radius: 8px;
            padding: 16px;
        }

        .module-title {
            font-size: 16px;
            font-weight: 700;
            color: #333333;
            margin-bottom: 16px;
            text-align: center;
        }

        .cpu {
            position: absolute;
            top: 46px;
            left: 36px;
            width: 80px;
            height: 60px;
            background-color: #f0f0f0;
            border: 1px solid #999999;
            border-radius: 4px;
        }

        .cpu-label {
            position: absolute;
            top: 66px;
            left: 56px;
            font-size: 14px;
            font-weight: 600;
            color: #333333;
        }

        .ram {
            position: absolute;
            top: 46px;
            left: 136px;
            width: 60px;
            height: 60px;
            background-color: #f0f0f0;
            border: 1px solid #999999;
            border-radius: 4px;
        }

        .ram-label {
            position: absolute;
            top: 66px;
            left: 151px;
            font-size: 14px;
            font-weight: 600;
            color: #333333;
        }

        .ssd {
            position: absolute;
            top: 46px;
            right: 36px;
            width: 60px;
            height: 60px;
            background-color: #f0f0f0;
            border: 1px solid #999999;
            border-radius: 4px;
        }

        .ssd-label {
            position: absolute;
            top: 66px;
            right: 51px;
            font-size: 14px;
            font-weight: 600;
            color: #333333;
        }

        .gpu {
            position: absolute;
            top: 46px;
            left: 36px;
            width: 120px;
            height: 60px;
            background-color: #e6f7ff;
            border: 1px solid #1890ff;
            border-radius: 4px;
        }

        .gpu-label {
            position: absolute;
            top: 66px;
            left: 76px;
            font-size: 14px;
            font-weight: 600;
            color: #1890ff;
        }

        .vram {
            position: absolute;
            top: 46px;
            right: 36px;
            width: 120px;
            height: 60px;
            background-color: #f6ffed;
            border: 1px solid #52c41a;
            border-radius: 4px;
        }

        .vram-label {
            position: absolute;
            top: 66px;
            right: 76px;
            font-size: 14px;
            font-weight: 600;
            color: #52c41a;
        }

        .connection-line {
            position: absolute;
            top: 175px;
            left: 400px;
            width: 200px;
            height: 2px;
            background-color: #999999;
        }

        .arrow {
            position: absolute;
            top: 170px;
            right: 400px;
            width: 10px;
            height: 10px;
            border-left: 2px solid #999999;
            border-bottom: 2px solid #999999;
            transform: rotate(-45deg);
        }

        .node {
            position: absolute;
            width: 180px;
            height: 100px;
            background-color: #ffffff;
            border: 1px solid #cccccc;
            border-radius: 8px;
            padding: 12px;
        }

        .node-1 {
            top: 300px;
            left: 50px;
        }

        .node-2 {
            top: 300px;
            left: 250px;
        }

        .node-3 {
            top: 300px;
            left: 450px;
        }

        .node-4 {
            top: 300px;
            left: 650px;
        }

        .node-title {
            font-size: 14px;
            font-weight: 600;
            color: #333333;
            margin-bottom: 12px;
            text-align: center;
        }

        .node-gpu {
            position: absolute;
            top: 40px;
            left: 20px;
            width: 60px;
            height: 40px;
            background-color: #e6f7ff;
            border: 1px solid #1890ff;
            border-radius: 4px;
        }

        .node-vram {
            position: absolute;
            top: 40px;
            right: 20px;
            width: 60px;
            height: 40px;
            background-color: #f6ffed;
            border: 1px solid #52c41a;
            border-radius: 4px;
        }

        .status-panel {
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            gap: 24px;
        }

        .status-item {
            flex: 1;
            text-align: center;
        }

        .status-label {
            font-size: 14px;
            color: #333333;
            margin-bottom: 8px;
        }

        .status-value {
            font-size: 24px;
            font-weight: 700;
            color: #333333;
        }

        .status-value.gpu {
            color: #1890ff;
        }

        .status-value.vram {
            color: #52c41a;
        }

        @media (max-width: 1200px) {
            .isometric-container {
                min-height: 700px;
            }

            .host-module,
            .device-module {
                position: static;
                margin: 24px auto;
            }

            .connection-line {
                display: none;
            }

            .node {
                position: static;
                margin: 16px auto;
            }

            .status-panel {
                flex-direction: column;
                align-items: center;
            }

            .status-item {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>状态观测面板</h1>
        </header>

        <div class="isometric-container">
            <!-- Host 模块 -->
            <div class="host-module">
                <div class="module-title">HOST</div>
                <div class="cpu"></div>
                <div class="cpu-label">CPU</div>
                <div class="ram"></div>
                <div class="ram-label">RAM</div>
                <div class="ssd"></div>
                <div class="ssd-label">SSD</div>
            </div>

            <!-- Device 模块 -->
            <div class="device-module">
                <div class="module-title">DEVICE</div>
                <div class="gpu"></div>
                <div class="gpu-label">GPU</div>
                <div class="vram"></div>
                <div class="vram-label">VRAM</div>
            </div>

            <!-- 连接线 -->
            <div class="connection-line"></div>
            <div class="arrow"></div>

            <!-- 集群节点 -->
            <div class="node node-1">
                <div class="node-title">Node 1</div>
                <div class="node-gpu"></div>
                <div class="node-vram"></div>
            </div>

            <div class="node node-2">
                <div class="node-title">Node 2</div>
                <div class="node-gpu"></div>
                <div class="node-vram"></div>
            </div>

            <div class="node node-3">
                <div class="node-title">Node 3</div>
                <div class="node-gpu"></div>
                <div class="node-vram"></div>
            </div>

            <div class="node node-4">
                <div class="node-title">Node 4</div>
                <div class="node-gpu"></div>
                <div class="node-vram"></div>
            </div>
        </div>

        <div class="status-panel">
            <div class="status-item">
                <div class="status-label">CPU 使用率</div>
                <div class="status-value">65%</div>
            </div>
            <div class="status-item">
                <div class="status-label">GPU 使用率</div>
                <div class="status-value gpu">85%</div>
            </div>
            <div class="status-item">
                <div class="status-label">内存使用率</div>
                <div class="status-value">72%</div>
            </div>
            <div class="status-item">
                <div class="status-label">VRAM 使用率</div>
                <div class="status-value vram">90%</div>
            </div>
            <div class="status-item">
                <div class="status-label">训练进度</div>
                <div class="status-value">45%</div>
            </div>
        </div>
    </div>
</body>
</html>
