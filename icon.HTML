<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI 灵动图标动效</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f0f2f5;
    margin: 0;
  }

  /* 图标容器，负责整体的旋转和缓动 */
  .icon-container {
    width: 120px;
    height: 120px;
    position: relative;
    /* 核心：cubic-bezier(0.65, 0, 0.35, 1) 实现完美的慢-快-慢过渡 */
    transition: transform 1.2s cubic-bezier(0.65, 0, 0.35, 1);
  }

  /* 单个图标的通用样式 */
  .icon {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    /* 透明度切换时间，配合旋转实现融合 */
    transition: opacity 0.6s ease-in-out;
    object-fit: contain;
  }

  /* 当前激活的图标显示 */
  .icon.active {
    opacity: 1;
  }
</style>
</head>
<body>

<div class="icon-container" id="animBox">
  <img src="images/AI星星 1.png" class="icon active" alt="Star 1">
  <img src="images/BulbFilled 1.png" class="icon" alt="Bulb">
  <img src="images/命令行 1.png" class="icon" alt="Code">
  <img src="images/图标-多角星 1.png" class="icon" alt="Multi-star">
  <img src="images/AI星星 1 - 副本.png" class="icon" alt="Star 2">
</div>

<script>
  const container = document.getElementById('animBox');
  const icons = document.querySelectorAll('.icon');
  
  let currentDeg = 0;
  let currentIndex = 0;

  function triggerAnimation() {
    // 每次增加 360 度，确保顺时针持续旋转
    currentDeg += 360;
    container.style.transform = `rotate(${currentDeg}deg)`;

    // 在旋转到一半（速度最快时）切换图标的透明度，实现视觉上的平滑衔接
    setTimeout(() => {
      icons[currentIndex].classList.remove('active');
      currentIndex = (currentIndex + 1) % icons.length;
      icons[currentIndex].classList.add('active');
    }, 600); // 1.2s 的一半是 600ms
  }

  // 每隔 2.5 秒触发一次完整动效（包含停留展示时间）
  setInterval(triggerAnimation, 2500);
</script>

</body>
</html>
